<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Support Chat — Promptetheus demo</title>
<style>
  :root {
    --bg: #0e1117; --panel: #161b22; --panel-2: #1c2330; --line: #2a3340;
    --text: #e6edf3; --muted: #8b97a7; --agent: #1f6feb; --user: #2d333b;
    --tool: #131a24; --danger: #f85149; --danger-bg: #2d1417; --ok: #3fb950;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px;
  }
  .app { width: 100%; max-width: 560px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,.45);
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    background: var(--panel-2); border-bottom: 1px solid var(--line);
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; flex: none;
    background: linear-gradient(135deg, #1f6feb, #388bfd); display: grid; place-items: center; font-size: 18px;
  }
  header h1 { font-size: 15px; margin: 0; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .badge {
    margin-left: auto; font-size: 11px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; white-space: nowrap;
  }
  header .badge .dot { color: var(--ok); }

  #log { height: 420px; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 16px; white-space: pre-wrap; word-wrap: break-word;
    animation: pop .18s ease-out;
  }
  .row.agent .bubble { background: var(--agent); border-bottom-left-radius: 4px; }
  .row.user .bubble  { background: var(--user); border-bottom-right-radius: 4px; }
  .row.tool { justify-content: center; }
  .row.tool .bubble {
    background: var(--tool); border: 1px dashed var(--line); color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; max-width: 92%;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .typing .bubble { color: #cdd6e0; }
  .typing .bubble span { display: inline-block; animation: blink 1.2s infinite; }
  .typing .bubble span:nth-child(2) { animation-delay: .2s; }
  .typing .bubble span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .2; } 40% { opacity: 1; } }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 18px 12px; }
  .chip-btn {
    background: transparent; color: #cfe2ff; border: 1px solid var(--agent); border-radius: 999px;
    padding: 8px 14px; font-size: 13px; cursor: pointer; transition: background .12s;
  }
  .chip-btn:hover { background: rgba(31,111,235,.15); }

  form {
    display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--line); background: var(--panel-2);
  }
  input[type=text] {
    flex: 1; background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    color: var(--text); padding: 10px 12px; font-size: 14px; outline: none;
  }
  input[type=text]:focus { border-color: var(--agent); }
  .send { background: var(--agent); border: 0; color: #fff; border-radius: 10px; padding: 0 16px; cursor: pointer; font-size: 14px; }
  .send:disabled { opacity: .5; cursor: default; }

  .incident {
    margin: 0 14px 14px; border: 1px solid var(--danger); background: var(--danger-bg);
    border-radius: 12px; padding: 14px 16px; display: none;
  }
  .incident.show { display: block; animation: pop .25s ease-out; }
  .incident h3 { margin: 0 0 6px; font-size: 13px; color: var(--danger); letter-spacing: .3px; }
  .incident p { margin: 0 0 10px; font-size: 13px; }
  .meta { font-size: 11.5px; color: var(--muted); }
  .ev-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .ev-chip {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px; color: var(--muted);
  }
  .ev-chip.fail { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>
  <div class="app">
    <div class="card">
      <header>
        <div class="avatar">🩺</div>
        <div>
          <h1>HealthPlan Support</h1>
          <div class="sub">Billing &amp; refunds · Robin</div>
        </div>
        <div class="badge"><span class="dot">●</span> instrumented by Promptetheus</div>
      </header>

      <div id="log"></div>
      <div class="chips" id="chips"></div>
      <div class="incident" id="incident">
        <h3>⚠ SILENT FAILURE DETECTED</h3>
        <p id="incidentText"></p>
        <div class="meta" id="incidentMeta"></div>
        <div class="ev-chips" id="evChips"></div>
      </div>

      <form id="form">
        <input type="text" id="text" placeholder="Type a message…" autocomplete="off" />
        <button class="send" id="send" type="submit">Send</button>
      </form>
    </div>
  </div>

<script>
const log = document.getElementById("log");
const chips = document.getElementById("chips");
const incident = document.getElementById("incident");
const form = document.getElementById("form");
const textInput = document.getElementById("text");
const sendBtn = document.getElementById("send");

let conversationId = null;
let busy = false;

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function addBubble(role, text) {
  const row = document.createElement("div");
  row.className = "row " + role;
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  row.appendChild(b);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}

function typing() {
  const row = document.createElement("div");
  row.className = "row agent typing";
  row.innerHTML = '<div class="bubble"><span>●</span><span>●</span><span>●</span></div>';
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row;
}

function renderChips(options) {
  chips.innerHTML = "";
  for (const o of options) {
    const btn = document.createElement("button");
    btn.className = "chip-btn";
    btn.textContent = o.label;
    btn.onclick = () => send({ choice_id: o.id, echo: o.label });
    chips.appendChild(btn);
  }
}

function showIncident(inc) {
  document.getElementById("incidentText").textContent =
    "The agent retrieved the correct order ($20, refundable $20) but issued a $200 refund — " +
    "a 10× overpayment — and carried on as if it helped. goal_check FAILED.";
  document.getElementById("incidentMeta").textContent =
    `session ${inc.session_id} · ${inc.events_emitted} events → ${inc.target} · ` +
    `SDK: ${inc.using_real_sdk ? "real" : "local fallback"}`;
  const ev = document.getElementById("evChips");
  ev.innerHTML = "";
  for (const t of inc.event_types) {
    const c = document.createElement("span");
    c.className = "ev-chip" + (t === "goal_check" ? " fail" : "");
    c.textContent = t;
    ev.appendChild(c);
  }
  incident.classList.add("show");
}

async function send({ choice_id = null, text = null, echo = null } = {}) {
  if (busy) return;
  busy = true;
  sendBtn.disabled = true;
  chips.innerHTML = "";
  if (echo) addBubble("user", echo);

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ conversation_id: conversationId, choice_id, text }),
  });
  const data = await res.json();
  conversationId = data.conversation_id;

  for (const msg of data.messages) {
    if (msg.role === "tool") {
      await sleep(450);
      addBubble("tool", msg.text);
    } else {
      const t = typing();
      await sleep(750);
      t.remove();
      addBubble("agent", msg.text);
    }
    await sleep(280);
  }

  if (data.incident) {
    await sleep(450);
    showIncident(data.incident);
  }
  renderChips(data.options);
  busy = false;
  sendBtn.disabled = false;
  textInput.focus();
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const v = textInput.value.trim();
  if (!v) return;
  textInput.value = "";
  send({ text: v, echo: v });
});

// Kick off the conversation (greeting).
send();
</script>
</body>
</html>
